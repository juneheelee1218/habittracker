<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌿 junehee & carolina</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --j: #3a7bd5;
      --j-bg: #e8f0fb;
      --j-light: #b8d0f5;
      --j-dark: #1e4fa3;
      --j-text: #1e3a6e;
      --c: #1b6b3a;
      --c-bg: #d8eedd;
      --c-light: #9ecfaf;
      --c-dark: #0a2818;
      --c-text: #14472a;
      --bg: #f4f7f5;
      --white: #ffffff;
      --border: #e4e9e6;
      --muted: #9aaa9f;
    }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #1a2e22; min-height: 100vh; }
    h1, h2 { font-family: 'DM Serif Display', serif; }

    #header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.93);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 0;
      text-align: center;
    }
    #header h1 { font-size: clamp(20px,4vw,30px); color: #0f2019; letter-spacing: 0.02em; margin-bottom: 2px; }
    .subtitle { font-size: 11px; color: var(--muted); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 16px; }

    .week-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
    .arrow-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1.5px solid var(--c); background: var(--white); color: var(--c);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .arrow-btn:hover:not(:disabled) { background: var(--c); color: white; }
    .arrow-btn:disabled { border-color: #ddd; color: #ccc; cursor: default; }
    .week-label-wrap { min-width: 190px; text-align: center; }
    .week-status { font-size: 13px; font-weight: 700; color: #0f2019; }
    .week-dates { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .dots { display: flex; justify-content: center; flex-wrap: wrap; gap: 4px; max-width: 380px; margin: 0 auto 12px; }
    .dot { height: 6px; border-radius: 3px; border: none; cursor: pointer; padding: 0; transition: all 0.2s; flex-shrink: 0; }

    .tabs { display: flex; justify-content: center; gap: 6px; margin-bottom: -1px; }
    .tab {
      padding: 8px 24px; border: none; border-bottom: 2.5px solid transparent;
      background: none; font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 600; color: var(--muted); cursor: pointer; letter-spacing: 0.06em; transition: all 0.15s;
    }
    .tab.active { color: var(--c-dark); border-bottom-color: var(--c); }

    #main {
      max-width: 920px; margin: 28px auto 60px; padding: 0 16px;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px; align-items: start;
    }

    .card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
    .card-head { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .card-name { font-size: 18px; font-weight: 700; }
    .card-sub { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; margin-top: 1px; }
    .card-body { padding: 16px 18px; }

    .habit-row { margin-bottom: 20px; }
    .habit-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .habit-label { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; }
    .yt-btn {
      width: 18px; height: 18px; border-radius: 50%; background: #ff0000; color: white;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 7px; text-decoration: none; flex-shrink: 0;
    }
    .habit-count { font-size: 11px; font-weight: 700; }

    .day-tiles { display: flex; gap: 4px; }
    .day-tile {
      flex: 1; aspect-ratio: 1; min-width: 0; border-radius: 8px;
      border: 1.5px solid #eee; background: #fafafa; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1px; padding: 3px 0; transition: all 0.12s; font-family: 'DM Sans', sans-serif;
    }
    .day-tile .dl { font-size: 8px; font-weight: 700; color: #bbb; }
    .day-tile .dc { font-size: 9px; color: white; display: none; }
    .day-tile.checked .dl { color: white; }
    .day-tile.checked .dc { display: block; }
    .day-tile.locked { opacity: 0.25; cursor: default; }

    .pbar-wrap { margin-top: 5px; height: 3px; border-radius: 99px; background: #f0f0f0; overflow: hidden; }
    .pbar { height: 100%; border-radius: 99px; transition: width 0.4s ease; }

    .summary { margin-top: 4px; padding: 9px 13px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
    .summary-label { font-size: 12px; font-style: italic; }
    .summary-pills { display: flex; gap: 4px; }
    .summary-pill { font-size: 11px; font-weight: 700; background: white; border-radius: 6px; padding: 2px 8px; }

    .todo-input-wrap { padding: 12px 16px 10px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
    .todo-input {
      flex: 1; border: 1.5px solid #e8e8e8; border-radius: 9px;
      padding: 8px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif;
      outline: none; color: #333; background: #fafafa; transition: border-color 0.15s;
    }
    .todo-input:focus { border-color: #3a7bd5; }
    .todo-add { border: none; border-radius: 9px; padding: 8px 14px; font-size: 17px; cursor: pointer; color: white; flex-shrink: 0; }

    .todo-list { padding: 10px 14px; min-height: 70px; }
    .todo-empty { text-align: center; color: #ccc; font-size: 13px; padding: 20px 0; font-style: italic; }
    .todo-item { display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 9px; margin-bottom: 4px; border: 1px solid #efefef; background: white; transition: all 0.15s; }
    .todo-item.done { background: #fafafa; border-color: #f0f0f0; }
    .todo-check { width: 19px; height: 19px; border-radius: 5px; padding: 0; border: 2px solid #ddd; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; color: white; transition: all 0.12s; }
    .todo-text { flex: 1; font-size: 13px; color: #333; line-height: 1.4; }
    .todo-item.done .todo-text { text-decoration: line-through; color: #bbb; }
    .todo-del { background: none; border: none; color: #ddd; cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1; transition: color 0.12s; }
    .todo-del:hover { color: #aaa; }
    .todo-footer { padding: 6px 16px 13px; font-size: 11px; color: #ccc; font-style: italic; text-align: center; }

    #sync-bar {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #1a2e22; color: white; font-size: 12px;
      padding: 6px 16px; border-radius: 99px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
      font-family: 'DM Sans', sans-serif;
    }
    #sync-bar.show { opacity: 1; }

    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif; font-size: 22px; color: #1b6b3a;
      z-index: 999;
    }
  </style>
</head>
<body>

<div id="loading">🌿 loading...</div>

<div id="app" style="display:none">
  <div id="header">
    <h1>🌿 junehee &amp; carolina 🌲</h1>
    <div class="subtitle">our little accountability corner</div>
    <div class="week-nav">
      <button class="arrow-btn" id="prev-btn">‹</button>
      <div class="week-label-wrap">
        <div class="week-status" id="week-status"></div>
        <div class="week-dates" id="week-dates"></div>
      </div>
      <button class="arrow-btn" id="next-btn">›</button>
    </div>
    <div class="dots" id="dots"></div>
    <div class="tabs">
      <button class="tab active" data-tab="habits">✦ Habits</button>
      <button class="tab" data-tab="todos">✦ To-Do Lists</button>
    </div>
  </div>
  <div id="main"></div>
</div>

<div id="sync-bar">✓ Synced</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCcCAxjUFpWqljvLG6kEoNIv7LdqryABcE",
    authDomain: "habittracker111.firebaseapp.com",
    databaseURL: "https://habittracker111-default-rtdb.firebaseio.com",
    projectId: "habittracker111",
    storageBucket: "habittracker111.firebasestorage.app",
    messagingSenderId: "620422128795",
    appId: "1:620422128795:web:36b2e1bb5316067c11123e",
    measurementId: "G-RRSZLE8B6M"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── CONFIG ──
  const WEEKS = (() => {
    const weeks = [];
    const start = new Date(2026, 3, 20); // April 20 2026 (Mon)
    const end   = new Date(2026, 6, 31); // July 31 2026
    let cur = new Date(start);
    while (cur <= end) {
      const mon = new Date(cur);
      const sun = new Date(cur); sun.setDate(mon.getDate() + 6);
      weeks.push({
        key: mon.toISOString().slice(0,10), mon, sun,
        label: mon.toLocaleDateString("en-US",{month:"short",day:"numeric"}) +
               " – " + sun.toLocaleDateString("en-US",{month:"short",day:"numeric"})
      });
      cur.setDate(cur.getDate() + 7);
    }
    return weeks;
  })();

  const HABITS = [
    { id:"hydration", label:"Hydration 💧" },
    { id:"abs",       label:"Abs 🔥", link:"https://www.youtube.com/watch?v=2pLT-olgUJs&t=48s" },
  ];
  const PEOPLE = ["junehee","carolina"];
  const DAYS   = ["M","T","W","T","F","S","S"];
  const COLORS = {
    junehee: { bg:"#e8f0fb", accent:"#3a7bd5", light:"#b8d0f5", dark:"#1e4fa3", text:"#1e3a6e" },
    carolina: { bg:"#d8eedd", accent:"#1b6b3a", light:"#9ecfaf", dark:"#0a2818", text:"#14472a" },
  };
  const EMOJI   = { junehee:"🌿", carolina:"🌲" };
  const DISPLAY = { junehee:"Junehee", carolina:"Carolina" };

  // ── STATE ──
  let weekIdx   = 0;
  let activeTab = "habits";
  let remoteData = { habits:{}, todos:{ junehee:[], carolina:[] } };
  let todoInputs = { junehee:"", carolina:"" };

  function getTodayIndex(weekMon) {
    const now = new Date(); now.setHours(0,0,0,0);
    const diff = Math.floor((now - weekMon) / 86400000);
    if (diff < 0) return -1;
    if (diff > 6) return 7;
    return diff;
  }

  function emptyWeekHabits() {
    return PEOPLE.reduce((acc,p) => {
      acc[p] = HABITS.reduce((h,hab) => { h[hab.id]=Array(7).fill(false); return h; },{});
      return acc;
    },{});
  }

  // ── SYNC FLASH ──
  function flashSync() {
    const bar = document.getElementById("sync-bar");
    bar.classList.add("show");
    setTimeout(() => bar.classList.remove("show"), 1800);
  }

  // ── FIREBASE WRITES ──
  function writeHabit(weekKey, person, habitId, dayIdx, val) {
    set(ref(db, `habits/${weekKey}/${person}/${habitId}/${dayIdx}`), val);
    flashSync();
  }

  function writeTodos(person, list) {
    set(ref(db, `todos/${person}`), list);
    flashSync();
  }

  // ── RENDER ──
  function render() {
    renderHeader();
    renderMain();
  }

  function renderHeader() {
    const week = WEEKS[weekIdx];
    const isNow = weekIdx === 0;
    const todayI = getTodayIndex(week.mon);
    document.getElementById("week-status").textContent =
      isNow ? "✦ This Week" :
      todayI === 7 ? `Week ${weekIdx+1} — done ✓` :
      `Week ${weekIdx+1} of ${WEEKS.length}`;
    document.getElementById("week-dates").textContent = week.label;
    document.getElementById("prev-btn").disabled = weekIdx === 0;
    document.getElementById("next-btn").disabled = weekIdx === WEEKS.length - 1;

    const dotsEl = document.getElementById("dots");
    dotsEl.innerHTML = "";
    WEEKS.forEach((w,i) => {
      const d = document.createElement("button");
      d.className = "dot";
      d.title = w.label;
      d.style.width = i===weekIdx ? "20px" : "7px";
      d.style.background = i===weekIdx ? "#1b6b3a" : i<weekIdx ? "#9ecfaf" : "#ddd";
      d.onclick = () => { weekIdx=i; render(); };
      dotsEl.appendChild(d);
    });
  }

  function renderMain() {
    const main = document.getElementById("main");
    main.innerHTML = "";
    if (activeTab === "habits") {
      PEOPLE.forEach(p => main.appendChild(buildHabitCard(p)));
    } else {
      PEOPLE.forEach(p => main.appendChild(buildTodoCard(p)));
    }
  }

  function buildHabitCard(person) {
    const C = COLORS[person];
    const week = WEEKS[weekIdx];
    const isNow = weekIdx === 0;
    const todayI = getTodayIndex(week.mon);
    const weekHabits = remoteData.habits[week.key] || emptyWeekHabits();

    const card = el("div","card");

    // Header
    const head = el("div","card-head");
    head.style.background = `linear-gradient(135deg,${C.bg} 0%,white 100%)`;
    head.innerHTML = `
      <div class="avatar" style="background:${C.accent};color:white">${EMOJI[person]}</div>
      <div>
        <div class="card-name" style="color:${C.dark}">${DISPLAY[person]}</div>
        <div class="card-sub" style="color:${C.accent}">
          ${isNow?"this week":todayI===7?"completed":"upcoming"} · week ${weekIdx+1}
        </div>
      </div>`;
    card.appendChild(head);

    const body = el("div","card-body");

    HABITS.forEach(habit => {
      const raw = weekHabits[person] && weekHabits[person][habit.id];
      const arr = Array.isArray(raw) ? raw : Array(7).fill(false);
      const limit = todayI<0?0:todayI>=7?7:todayI+1;
      const count = arr.slice(0,limit).filter(Boolean).length;
      const pct   = limit>0 ? Math.round((count/limit)*100) : 0;

      const row = el("div","habit-row");
      row.innerHTML = `
        <div class="habit-top">
          <div class="habit-label" style="color:${C.dark}">
            ${habit.label}
            ${habit.link?`<a class="yt-btn" href="${habit.link}" target="_blank" rel="noreferrer">▶</a>`:""}
          </div>
          <span class="habit-count" style="color:${count>0?C.accent:"#ccc"}">${count}/${limit===0?"–":limit}</span>
        </div>
        <div class="day-tiles" id="dt-${person}-${habit.id}"></div>
        <div class="pbar-wrap"><div class="pbar" style="width:${pct}%;background:${C.accent}"></div></div>`;
      body.appendChild(row);

      const tilesWrap = row.querySelector(`#dt-${person}-${habit.id}`);
      DAYS.forEach((d,i) => {
        const checked     = arr[i] === true;
        const isToday     = isNow && i===todayI;
        const isFutureDay = isNow && i>todayI;
        const isFutureWk  = todayI===-1;
        const locked      = isFutureDay || isFutureWk;

        const btn = el("button","day-tile"+(checked?" checked":"")+(isToday?" today":"")+(locked?" locked":""));
        btn.innerHTML = `<span class="dl">${d}</span><span class="dc">✓</span>`;
        btn.disabled = locked;

        if (checked)       { btn.style.background=C.accent; btn.style.borderColor=C.accent; }
        else if (isToday)  { btn.style.borderColor=C.accent; btn.style.background=C.bg; }

        if (!locked) btn.onclick = () => writeHabit(week.key, person, habit.id, i, !arr[i]);
        tilesWrap.appendChild(btn);
      });
    });

    // Summary
    const sum = el("div","summary");
    sum.style.background = C.bg;
    const weekHabits2 = remoteData.habits[week.key] || emptyWeekHabits();
    const todayI2 = getTodayIndex(WEEKS[weekIdx].mon);
    sum.innerHTML = `
      <span class="summary-label" style="color:${C.text}">
        ${isNow?"so far this week":todayI===7?"final score":"upcoming week"}
      </span>
      <div class="summary-pills">
        ${HABITS.map(h=>{
          const raw2 = weekHabits2[person]&&weekHabits2[person][h.id];
          const a2   = Array.isArray(raw2)?raw2:Array(7).fill(false);
          const lim2 = todayI2<0?0:todayI2>=7?7:todayI2+1;
          const c2   = a2.slice(0,lim2).filter(Boolean).length;
          const p2   = lim2>0?Math.round((c2/lim2)*100):0;
          return `<span class="summary-pill" style="color:${C.text}">${h.id==="hydration"?"💧":"🔥"} ${lim2===0?"–":p2+"%"}</span>`;
        }).join("")}
      </div>`;
    body.appendChild(sum);
    card.appendChild(body);
    return card;
  }

  function buildTodoCard(person) {
    const C    = COLORS[person];
    const raw  = remoteData.todos && remoteData.todos[person];
    const list = Array.isArray(raw) ? raw : (raw ? Object.values(raw) : []);
    const done = list.filter(t=>t.done).length;
    const other = DISPLAY[person==="junehee"?"carolina":"junehee"];

    const card = el("div","card");

    // Header
    const head = el("div","card-head");
    head.style.background = `linear-gradient(135deg,${C.bg} 0%,white 100%)`;
    head.innerHTML = `
      <div class="avatar" style="background:${C.accent};color:white">${EMOJI[person]}</div>
      <div style="flex:1">
        <div class="card-name" style="color:${C.dark}">${DISPLAY[person]}</div>
        <div class="card-sub" style="color:${C.accent}">to-do list</div>
      </div>
      ${list.length>0?`<span style="font-size:11px;font-weight:700;color:${C.text};background:${C.bg};border-radius:99px;padding:3px 11px">${done}/${list.length}</span>`:""}`;
    card.appendChild(head);

    // Input
    const inputWrap = el("div","todo-input-wrap");
    const inp = document.createElement("input");
    inp.className = "todo-input";
    inp.placeholder = "add something...";
    inp.value = todoInputs[person];
    inp.oninput = e => { todoInputs[person]=e.target.value; };
    inp.onkeydown = e => { if(e.key==="Enter") doAdd(person,inp); };
    const addBtn = el("button","todo-add");
    addBtn.style.background = C.accent;
    addBtn.textContent = "+";
    addBtn.onclick = () => doAdd(person,inp);
    inputWrap.appendChild(inp); inputWrap.appendChild(addBtn);
    card.appendChild(inputWrap);

    // List
    const listEl = el("div","todo-list");
    if (list.length===0) {
      listEl.innerHTML = `<div class="todo-empty">nothing here yet ✨</div>`;
    } else {
      list.forEach(todo => {
        const item = el("div","todo-item"+(todo.done?" done":""));
        const chk  = el("button","todo-check");
        chk.style.borderColor = todo.done ? C.accent : "#ddd";
        chk.style.background  = todo.done ? C.accent : "white";
        chk.textContent = todo.done?"✓":"";
        chk.onclick = () => writeTodos(person, list.map(t=>t.id===todo.id?{...t,done:!t.done}:t));

        const txt = el("span","todo-text");
        txt.textContent = todo.text;

        const del = el("button","todo-del");
        del.textContent = "×";
        del.onclick = () => writeTodos(person, list.filter(t=>t.id!==todo.id));

        item.appendChild(chk); item.appendChild(txt); item.appendChild(del);
        listEl.appendChild(item);
      });
    }
    card.appendChild(listEl);

    const footer = el("div","todo-footer");
    footer.textContent = `${other} can see this too 👀`;
    card.appendChild(footer);
    return card;
  }

  function doAdd(person, inp) {
    const text = (inp.value||"").trim();
    if (!text) return;
    const raw  = remoteData.todos&&remoteData.todos[person];
    const list = Array.isArray(raw)?raw:(raw?Object.values(raw):[]);
    writeTodos(person, [...list, {id:Date.now(), text, done:false}]);
    inp.value = "";
    todoInputs[person] = "";
  }

  function el(tag, cls) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }

  // ── FIREBASE LISTENER ──
  onValue(ref(db, "/"), snap => {
    const val = snap.val();
    if (val) {
      remoteData = val;
      if (!remoteData.todos)  remoteData.todos  = { junehee:[], carolina:[] };
      if (!remoteData.habits) remoteData.habits = {};
    }
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "block";
    render();
  });

  // ── CONTROLS ──
  document.querySelectorAll(".tab").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      activeTab = btn.dataset.tab;
      render();
    };
  });
  document.getElementById("prev-btn").onclick = () => { if(weekIdx>0){weekIdx--;render();} };
  document.getElementById("next-btn").onclick = () => { if(weekIdx<WEEKS.length-1){weekIdx++;render();} };
</script>
</body>
</html>
